<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 820" width="100%" style="max-width:720px;height:auto;display:block;margin:24px auto;font-family:'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">
